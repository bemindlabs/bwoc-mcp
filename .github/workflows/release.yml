name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # The aarch64 Linux target needs a cross linker.
      - name: Install cross linker (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build (release, http transport)
        run: cargo build --release --features http --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/bwoc-mcp"
          pkg="bwoc-mcp-${{ matrix.target }}.tar.gz"
          tar -czf "$pkg" -C "$(dirname "$bin")" bwoc-mcp
          echo "ASSET=$pkg" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/bwoc-mcp.exe"
          pkg="bwoc-mcp-${{ matrix.target }}.zip"
          7z a "$pkg" "$bin"
          echo "ASSET=$pkg" >> "$GITHUB_ENV"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true

      # Raw binary for the .mcpb desktop-extension pack job (below).
      - name: Upload raw binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/bwoc-mcp${{ runner.os == 'Windows' && '.exe' || '' }}
          if-no-files-found: error

  # Build the one-click Claude Desktop extension (bwoc-mcp.mcpb) covering
  # macOS (universal), Windows x64, and Linux x64, and attach it to the release.
  # aarch64-linux is not in the single bundle (MCPB keys on platform, not arch) —
  # those users build from source or use the tarball.
  pack-mcpb:
    name: pack .mcpb
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage server binaries
        run: |
          set -euo pipefail
          mkdir -p mcpb/server
          # macOS universal (aarch64 + x86_64 → universal2).
          lipo -create -output mcpb/server/bwoc-mcp-darwin \
            artifacts/bin-aarch64-apple-darwin/bwoc-mcp \
            artifacts/bin-x86_64-apple-darwin/bwoc-mcp
          chmod +x mcpb/server/bwoc-mcp-darwin
          cp artifacts/bin-x86_64-unknown-linux-gnu/bwoc-mcp mcpb/server/bwoc-mcp-linux
          chmod +x mcpb/server/bwoc-mcp-linux
          cp artifacts/bin-x86_64-pc-windows-msvc/bwoc-mcp.exe mcpb/server/bwoc-mcp-win32.exe
      - name: Validate + pack
        run: |
          npx -y @anthropic-ai/mcpb@latest validate mcpb/manifest.json
          npx -y @anthropic-ai/mcpb@latest pack mcpb bwoc-mcp.mcpb
      - name: Attach .mcpb to release
        uses: softprops/action-gh-release@v2
        with:
          files: bwoc-mcp.mcpb
          fail_on_unmatched_files: true
